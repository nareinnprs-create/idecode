name: Welcome Discussion

on:
  discussion:
    types: [created]

permissions:
  discussions: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Add welcome comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const discussion = context.payload.discussion;
            const author = discussion.user.login;

            const message = [
              `Hi @${author}, thanks for starting this discussion! 👋`,
              '',
              'The OPRAIZ IDECODE team will take a look soon. In the meantime, you might find helpful information in:',
              '- 📖 [OPRAIZ IDECODE Documentation](https://opraiz.ai/docs/)',
              '- ❓ [FAQ](https://opraiz.ai/docs/faq/)',
              '- 💬 [Previous Discussions](https://github.com/opraiz/idecode/discussions)',
              '',
              '---',
              '',
              '💙 OPRAIZ IDECODE is built and maintained by a community of contributors and sponsors. ' +
              'If OPRAIZ IDECODE is valuable to your work, consider [sponsoring the project](https://opraiz.ai/support/). ' +
              'For professional support, training, or consulting services, [learn more about available options](https://opraiz.ai/support/).'
            ].join('\n');

            await github.graphql(`
              mutation($discussionId: ID!, $body: String!) {
                addDiscussionComment(input: {discussionId: $discussionId, body: $body}) {
                  clientMutationId
                }
              }
            `, {
              discussionId: discussion.node_id,
              body: message
            });
