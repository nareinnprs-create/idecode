# A devfile to setup OPRAIZ IDECODE project in Che.
# For developers who work on OPRAIZ IDECODE core.

apiVersion: 1.0.0
metadata:
  generateName: opraiz-idecode-dev-
projects:
  - name: opraiz-idecode
    source:
      type: git
      location: "https://github.com/opraiz/idecode.git"
components:
  - alias: che-dev
    type: dockerimage
    image: "quay.io/eclipse/che-theia-dev:next"
    mountSources: true
    endpoints:
      - name: "idecode-dev-flow"
        port: 3000
        attributes:
          protocol: http
          public: "true"
    memoryLimit: "3.5Gi"
  - id: vscode/typescript-language-features/latest
    type: chePlugin
    memoryLimit: 2048M
  - type: cheEditor
    alias: theia-editor
    id: eclipse/che-theia/latest
    memoryLimit: "1Gi"
commands:
  - name: >
      idecode: Build Sources
    actions:
      - type: exec
        component: che-dev
        command: >
          killall node;
          npm ci && npm run build && npm run download:plugins
        workdir: /projects/opraiz-idecode
  - name: >
      idecode: Launch Browser Backend
    actions:
      - type: exec
        component: che-dev
        command: >
          test -f /tmp/node_idecode.pid && kill `cat /tmp/node_idecode.pid`;
          mkdir -p /tmp/idecode_projects &&
          export NODE_ENV=development &&
          node src-gen/backend/main.js /tmp/idecode_projects --hostname=0.0.0.0 --port=3000 --no-cluster --plugins=/projects/opraiz-idecode/plugins --hosted-plugin-inspect=9339 & echo $!> /tmp/node_idecode.pid ; wait `cat /tmp/node_idecode.pid`
        workdir: /projects/opraiz-idecode/examples/browser
  - name: >
      idecode: Watch Core Packages
    actions:
      - type: exec
        component: che-dev
        command: >
          npm run watch:compile
        workdir: /projects/opraiz-idecode
  - name: >
      idecode: Watch Browser Example
    actions:
      - type: exec
        component: che-dev
        command: >
          npm run watch
        workdir: /projects/opraiz-idecode/examples/browser
  - name: >
      idecode: Watch All
    actions:
      - type: exec
        component: che-dev
        command: >
          npm run watch
        workdir: ${workspaceRoot}/opraiz-idecode
