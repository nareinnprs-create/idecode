appId: com.opraiz.idecode
productName: OPRAIZ IDECODE
copyright: Copyright © 2026 OPRAIZ

directories:
  output: release
  buildResources: resources

files:
  - lib/**/*
  - src-gen/**/*
  - node_modules/**/*
  - "!node_modules/.cache"
  - package.json

extraMetadata:
  main: lib/backend/electron-main.js

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/app-icon-256.png
  artifactName: OPRAIZ-IDECODE-${version}-Setup-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: OPRAIZ IDECODE
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/app-icon-256.png
  category: public.app-category.developer-tools
  artifactName: OPRAIZ-IDECODE-${version}-${arch}.${ext}

dmg:
  artifactName: OPRAIZ-IDECODE-${version}-${arch}.${ext}

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/app-icon-256.png
  category: Development
  artifactName: OPRAIZ-IDECODE-${version}-${arch}.${ext}

publish: null
